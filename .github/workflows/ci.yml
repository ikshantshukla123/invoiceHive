name: CI — Lint & Test

# ── Runs on every push and pull request to main ───────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint all services in parallel ──────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false  # Don't cancel other services if one fails
      matrix:
        service:
          - auth-service
          - client-service
          - invoice-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/${{ matrix.service }}

      # Add ESLint later: npm run lint
      - name: Check for syntax errors
        run: node --check src/index.js
        working-directory: services/${{ matrix.service }}

  # ── Test auth service ───────────────────────────────────────────────────────
  test-auth:
    name: Test — auth-service
    runs-on: ubuntu-latest
    needs: lint

    # Spin up MongoDB and Redis for integration tests
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/auth-service

      - name: Run tests
        run: npm test
        working-directory: services/auth-service
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/invoicehive_auth_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_access_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          COOKIE_SECRET: test_cookie_secret
          CLIENT_URL: http://localhost:3000

  # ── Test client service ─────────────────────────────────────────────────────
  test-client:
    name: Test — client-service
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/client-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/client-service

      - name: Run tests
        run: npm test
        working-directory: services/client-service
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/invoicehive_clients_test
          JWT_ACCESS_SECRET: test_access_secret
          INTERNAL_SECRET: test_internal_secret

  # ── Test payment service ────────────────────────────────────────────────────
  test-payment:
    name: Test — payment-service
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/payment-service/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: services/payment-service

      - name: Run tests
        run: npm test
        working-directory: services/payment-service
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/invoicehive_payments_test
          JWT_ACCESS_SECRET: test_access_secret
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
          INTERNAL_SECRET: test_internal_secret

  # ── Nginx config validation ──────────────────────────────────────────────────
  validate-nginx:
    name: Validate Nginx config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate nginx.conf syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/gateway/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:1.25-alpine \
            nginx -t
