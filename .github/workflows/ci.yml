name: Simple CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    name: Check Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - client-service
          - invoice-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
        working-directory: ${{ matrix.service }}

      - name: Basic Syntax Check
        run: node --check src/index.js
        working-directory: ${{ matrix.service }}

