name: Deploy — Build, Push & Deploy to ORACLE

# ── Only runs on merge to main (after CI passes) ─────────────────────────────
on:
  push:
    branches: [main]

# ── Prevent concurrent deploys ────────────────────────────────────────────────
concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel a running deploy — finish it first

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}/invoicehive

jobs:
  # ── Build and push all Docker images ───────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        include:
          - service: auth-service
            context: auth-service
          - service: client-service
            context: client-service
          - service: invoice-service
            context: invoice-service
          - service: payment-service
            context: payment-service
          - service: notification-service
            context: notification-service
          - service: nginx
            context: gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Docker Buildx — multi-platform builds, better caching ──────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to Docker Hub ────────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Extract metadata (tags, labels) ───────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # ── Build and push with layer caching ─────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context:   ${{ matrix.context }}
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          # Cache layers in Docker Hub — massively speeds up subsequent builds
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:buildcache,mode=max

  # ── Deploy to ORACLE ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push  # Only runs if all builds succeeded
    environment: production  # Requires manual approval if configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Copy docker-compose.prod.yml to ORACLE ───────────────────────────────
      - name: Copy compose file to ORACLE
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.prod.yml,.env.example"
          target:   "/home/${{ secrets.EC2_USER }}/invoicehive"

      # ── SSH into EC2 and deploy ────────────────────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # Exit on any error

            cd /home/${{ secrets.EC2_USER }}/invoicehive

            echo "🔑 Logging into Docker Hub..."
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "📥 Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull

            echo "🔄 Restarting services with zero-downtime rolling update..."
            # Update services one at a time to avoid full downtime
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-build

            echo "⏳ Waiting for health checks..."
            sleep 15

            echo "🏥 Checking service health..."
            docker compose -f docker-compose.prod.yml ps

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deploy complete!"

      # ── Post-deploy health check ───────────────────────────────────────────
      - name: Verify deployment
        run: |
          # Wait for nginx to be ready
          sleep 10

          # Check the gateway health endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}/health)

          if [ "$response" = "200" ]; then
            echo "Gateway is healthy (HTTP $response)"
          else
            echo "Gateway health check failed (HTTP $response)"
            exit 1
          fi

      # ── Notify on failure ──────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          # Add Slack/Discord webhook notification here if needed
