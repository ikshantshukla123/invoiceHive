# ── Shared proxy settings ──────────────────────────────────────────────────────
# Applied to all proxy_pass locations via include or map

# ── Main API server ───────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.invoicehive.io localhost;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options         "DENY"            always;
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Hide Nginx version from error pages ───────────────
    server_tokens off;

    # ── Max request body size (for file uploads) ──────────
    client_max_body_size 10M;

    # ── Timeouts ──────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Shared proxy headers ──────────────────────────────
    # Forward real client IP and host to all services
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";  # Required for keepalive

    # ── Auth Service ─────────────────────────────────────
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://auth_service/auth/;
    }

    # ── Client Service ────────────────────────────────────
    location /clients/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://client_service/clients/;
    }

    # ── Invoice Service ───────────────────────────────────
    location /invoices/ {
        limit_req zone=api_limit burst=20 nodelay;

        # PDF generation can be slow — give it more time
        proxy_read_timeout 120s;

        proxy_pass http://invoice_service/invoices/;
    }

    # ── Payment Service — standard routes ─────────────────
    location /payments/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://payment_service/payments/;
    }

    # ── Stripe Webhook — special handling ─────────────────
    # Higher rate limit, no body size limit, preserve raw body
    location /payments/webhook {
        limit_req zone=webhook_limit burst=50 nodelay;

        # CRITICAL: Do NOT buffer the body for webhooks
        # Stripe needs raw bytes to verify the signature
        proxy_request_buffering off;
        client_max_body_size 1M;

        proxy_pass http://payment_service/payments/webhook;
    }

    # ── Health checks — no rate limiting ──────────────────
    location /health {
        access_log off; # Don't spam logs with health checks
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── Service health checks ─────────────────────────────
    location /health/auth         { proxy_pass http://auth_service/health; }
    location /health/clients      { proxy_pass http://client_service/health; }
    location /health/invoices     { proxy_pass http://invoice_service/health; }
    location /health/payments     { proxy_pass http://payment_service/health; }
    location /health/notifications { proxy_pass http://notification_service/health; }

    # ── Block internal routes from outside ────────────────
    # /internal/* endpoints are service-to-service only — never expose them
    location ~ ^/(auth|clients|invoices|payments)/internal/ {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }

    # ── 404 for unknown routes ────────────────────────────
    location / {
        return 404 '{"error":"route not found"}';
        add_header Content-Type application/json;
    }
}

