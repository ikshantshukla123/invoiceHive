# ── Rate limiting zones ─────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=20r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:1m rate=300r/m;


# ── Upstream services (Docker service names) ─────────────────────────
upstream auth_service {
    server auth-service:3001;
    keepalive 32;
}

upstream client_service {
    server client-service:3002;
    keepalive 32;
}

upstream invoice_service {
    server invoice-service:3003;
    keepalive 32;
}

upstream payment_service {
    server payment-service:3004;
    keepalive 32;
}

upstream notification_service {
    server notification-service:3005;
    keepalive 32;
}

# ── API Gateway server ───────────────────────────────────────────────
server {

    listen 80;

    server_name localhost api.invoicehive.io api.ikshant.me;

    # Global CORS headers
    add_header 'Access-Control-Allow-Origin' 'https://ikshant.me' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    # Handle OPTIONS method for CORS preflight
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' 'https://ikshant.me' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin" always;


    # Request size (PDF uploads etc)
    client_max_body_size 10M;


    # Proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;


    # ── AUTH SERVICE ─────────────────────────────
    location /api/auth {

        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://auth_service/auth;
    }


    # ── CLIENT SERVICE ───────────────────────────
    location /api/clients {

        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://client_service/clients;
    }


    # ── INVOICE SERVICE ──────────────────────────
    location /api/invoices {

        limit_req zone=api_limit burst=20 nodelay;

        proxy_read_timeout 120s;

        proxy_pass http://invoice_service/invoices;
    }


    # ── PAYMENT SERVICE ──────────────────────────
    location /api/payments {

        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://payment_service/payments;
    }


    # ── PAYMENT WEBHOOK (important for Razorpay) ─
    location /api/payments/webhook {

        limit_req zone=webhook_limit burst=50 nodelay;

        proxy_request_buffering off;

        client_max_body_size 1M;

        proxy_pass http://payment_service/payments/webhook;
    }


    # ── SERVICE HEALTH CHECKS ────────────────────
    location /health {

        return 200 '{"status":"ok","gateway":"nginx"}';

        add_header Content-Type application/json;

        access_log off;
    }

    location /health/auth {
        proxy_pass http://auth_service/health;
    }

    location /health/clients {
        proxy_pass http://client_service/health;
    }

    location /health/invoices {
        proxy_pass http://invoice_service/health;
    }

    location /health/payments {
        proxy_pass http://payment_service/health;
    }

    location /health/notifications {
        proxy_pass http://notification_service/health;
    }


    # ── BLOCK INTERNAL ROUTES ────────────────────
    location ~ ^/api/(auth|clients|invoices|payments)/internal {

        return 403 '{"error":"forbidden"}';

        add_header Content-Type application/json;
    }


    # ── API ROOT ───────────────────────
    location / {
        return 200 '{"status":"Welcome to InvoiceHive API"}';
        add_header Content-Type application/json;
    }

}