# ── Rate limiting zones (defined at http level) ───────────────────────────────
# Each zone lives in shared memory — tracks requests per IP across workers

limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=20r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:1m rate=300r/m;

# ── Upstream service definitions ──────────────────────────────────────────────
# Docker service names resolve automatically on the internal Docker network

upstream auth_service {
    server auth-service:3001;
    keepalive 32; # Reuse connections — faster than opening new ones each time
}

upstream client_service {
    server client-service:3002;
    keepalive 32;
}

upstream invoice_service {
    server invoice-service:3003;
    keepalive 32;
}

upstream payment_service {
    server payment-service:3004;
    keepalive 32;
}

upstream notification_service {
    server notification-service:3005;
    keepalive 32;
}

